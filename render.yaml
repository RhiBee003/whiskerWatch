# WhiskerWatch Render Blueprint — Rust web service (NOT a static React site).
#
# If https://whiskerwatch.onrender.com still shows a React SPA (<div id="root">),
# the existing Render resource is a Static Site from March 2025. Runtime cannot be
# changed after creation — delete that Static Site, then sync this Blueprint to
# create a Web Service named "whiskerwatch" (same .onrender.com URL).
#
# GitHub default branch should be "main" (Settings → Branches) so auto-deploy
# matches this file. Repo: https://github.com/RhiBee003/whiskerWatch.git
#
# SQLite lives at $DATA_DIR/whiskerwatch.db. Attach the disk below (Starter plan+)
# so user accounts survive redeploys.
services:
  - type: web
    name: whiskerwatch
    runtime: rust
    plan: starter
    region: oregon
    repo: https://github.com/RhiBee003/whiskerWatch.git
    branch: main
    buildCommand: cargo build --release
    startCommand: ./target/release/whiskerWatchWeb
    healthCheckPath: /
    autoDeploy: true
    disk:
      name: whiskerwatch-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
      - key: ADMIN_EMAIL
        value: rhibee003@gmail.com
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
