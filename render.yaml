# WhiskerWatch Render Blueprint — Rust web service (NOT a static React site).
#
# Live URL target: https://whiskerwatch.onrender.com
#
# If that URL still shows a React SPA (<div id="root">), the existing Render
# resource is a Static Site from March 2025. Runtime cannot be changed after
# creation — delete that Static Site, then sync this Blueprint to create a Web
# Service named "whiskerwatch" (same .onrender.com subdomain).
#
# GitHub default branch MUST be "main" (not cursor/rust-website-bootstrap) so
# auto-deploy tracks this file. See RENDER_SETUP.md.
#
# SQLite lives at $DATA_DIR/whiskerwatch.db. The persistent disk below (Starter+)
# keeps user accounts, forum Q&A, feedback, and contact messages across redeploys.
services:
  - type: web
    name: whiskerwatch
    runtime: rust
    plan: starter
    region: oregon
    repo: https://github.com/RhiBee003/whiskerWatch.git
    branch: main
    buildCommand: cargo build --release
    startCommand: ./target/release/whiskerWatchWeb
    healthCheckPath: /
    autoDeployTrigger: commit
    disk:
      name: whiskerwatch-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
      - key: PUBLIC_APP_URL
        value: https://whiskerwatch.onrender.com
      - key: ADMIN_EMAIL
        value: rhibee003@gmail.com
      - key: COMPANY_EMAIL
        value: WhiskerWatch.official@gmail.com
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_FROM_NAME
        value: WhiskerWatch
