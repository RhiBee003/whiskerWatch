<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WhiskerWatch Contact</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand" aria-label="WhiskerWatch">
        <img class="brand-logo" src="/images/logo.png" alt="WhiskerWatch" />
      </div>
      <nav>
        <a href="/">HOME</a>
        <a href="/#features">FEATURES</a>
        <a href="/login">LOG IN</a>
        <a href="/feedback">FEEDBACK</a>
        <a href="/contact">CONTACT</a>
      </nav>
    </header>

    <main class="section login-page">
      <section class="login-card" aria-labelledby="contact-title">
        <h1 id="contact-title">Contact WhiskerWatch</h1>
        <p>Questions about alerts, paw points, or your virtual pet? Send us a message.</p>
        {{CONTACT_SUCCESS_BLOCK}}
        {{CONTACT_ERROR_BLOCK}}

        <form class="login-form contact-form" action="/contact" method="post">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" placeholder="Your name" required />

          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required />

          <label for="subject">Subject</label>
          <input id="subject" name="subject" type="text" placeholder="How can we help?" required />

          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Tell us about your cat care question..." required></textarea>

          <button type="submit" class="download-btn login-submit">Send Message</button>
        </form>
      </section>
    </main>
  </body>
</html>
