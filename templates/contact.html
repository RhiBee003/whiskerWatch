<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>WhiskerWatch Contact</title>
    <link rel="stylesheet" href="/styles.css?v=20260708d" />
  </head>
  <body class="auth-page">
    <header class="topbar homepage-topbar">
      <a class="brand" href="/" aria-label="WhiskerWatch home">
        <img class="brand-logo" src="/images/logo.png" alt="WhiskerWatch" />
      </a>
      <details class="topbar-nav-menu">
        <summary class="topbar-nav-menu-trigger" aria-label="Open menu">
          <span class="topbar-menu-bars" aria-hidden="true"></span>
        </summary>
        <div class="topbar-nav-menu-panel">
          <nav id="public-nav" class="topbar-nav">
            <a href="/">HOME</a>
            <a href="/#features">FEATURES</a>
            <a href="/login">LOG IN</a>
            <a href="/feedback">FEEDBACK</a>
            <a href="/contact">CONTACT</a>
          </nav>
        </div>
      </details>
    </header>

    <main class="login-page">
      <section class="login-card" aria-labelledby="contact-title">
        <h1 id="contact-title">Contact WhiskerWatch</h1>
        <p>Questions about alerts, paw points, or your virtual pet? Send us a message.</p>
        <p class="contact-email">
          Or email us directly at
          <a href="mailto:{{CONTACT_EMAIL}}">{{CONTACT_EMAIL}}</a>
        </p>
        {{CONTACT_SUCCESS_BLOCK}}
        {{CONTACT_ERROR_BLOCK}}

        <form class="login-form contact-form" action="/contact" method="post">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" placeholder="Your name" value="{{FORM_NAME}}" required />

          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" value="{{FORM_EMAIL}}" required />

          <label for="subject">Subject</label>
          <input id="subject" name="subject" type="text" placeholder="How can we help?" required />

          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Tell us about your cat care question..." required></textarea>

          <button type="submit" class="download-btn login-submit">Send Message</button>
        </form>
      </section>
    </main>
    <script src="/paw-cursor.js"></script>
    <script src="/alerts.js"></script>
  </body>
</html>
