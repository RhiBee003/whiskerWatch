<html lang="en">

    <link rel="stylesheet" href="/styles.css?v=20260614d" />
  </head>
  <body class="dashboard-body breed-guide-body">
    <header class="dashboard-topbar">

        <span class="dashboard-greeting">Hi, {{USER_NAME}}!</span>

      {{BREED_GUIDE_CONTENT}}

        <a href="/home?tab=health" class="breed-guide-back-btn">Back to Health tab 💗</a>

    <script src="/paw-cursor.js"></script>
    <script src="/alerts.js"></script>
    <script src="/breed-guide.js?v=20260614n" defer></script>
