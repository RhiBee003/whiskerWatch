<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>WhiskerWatch — {{CAT_HOME_TITLE}}</title>
    <link rel="stylesheet" href="/styles.css?v=20260617a" />
  </head>
  <body class="dashboard-body cat-home-body">
    <header class="dashboard-topbar">
      <div class="brand" aria-label="WhiskerWatch">
        <img class="brand-logo" src="/images/logo.png" alt="WhiskerWatch" />
        <span class="dashboard-greeting">Hi, <a href="/home?tab=account" class="dashboard-greeting-link">{{USER_NAME}}</a>!</span>
      </div>
      <nav class="dashboard-nav">
        <a href="/home?tab=pet">HOME</a>
        <a href="/home?tab=feedback">FEEDBACK</a>
        {{ADMIN_NAV_LINK}}
        <a href="/contact">CONTACT</a>
        <form class="admin-logout-form" action="/logout" method="post">
          <button type="submit" class="admin-logout-btn">LOG OUT</button>
        </form>
      </nav>
    </header>

    <main class="cat-home-shell section">
      {{STATUS_BLOCK}}

      <div class="cat-home-shared" id="cat-home-shared">
        {{CAT_HOME_PLAY_SWITCHER}}

        <div class="cat-home-header">
          <div>
            <h1>{{CAT_HOME_TITLE}}</h1>
            <p class="panel-intro">{{CAT_HOME_INTRO}}</p>
          </div>
          <div class="cat-home-header-actions">
            <p class="cat-home-balance"><span class="stat-label stat-label-paw-points" aria-hidden="true">{{PAW_POINTS_ICON}}</span> <strong>{{PAW_POINTS}}</strong></p>
            <a href="/home?tab=pet" class="cat-home-back-link">🐾 Back to My Pet</a>
          </div>
        </div>

        {{CAT_HOME_LAYOUT}}
      </div>
    </main>

    {{NEED_PAW_POINTS_MODAL}}

    <div id="playdate-menu" class="playdate-menu" hidden>
      <div class="playdate-menu-panel" role="dialog" aria-labelledby="playdate-menu-title">
        <button type="button" class="playdate-menu-close" aria-label="Close playdate menu">×</button>
        <h3 id="playdate-menu-title">Playdate</h3>
        <p id="playdate-menu-lead" class="field-hint"></p>
        <div id="playdate-menu-actions" class="playdate-menu-actions"></div>
        <div id="playdate-menu-picker" class="playdate-menu-picker" hidden></div>
      </div>
    </div>
    <p id="playdate-toast" class="playdate-toast" role="status" hidden></p>

    <script src="/paw-cursor.js"></script>
    <script src="/alerts.js"></script>
    <script src="/shop-affordance.js?v=20260617b"></script>
    <script src="/pet-video-framer.js?v=20260613c"></script>
    <script src="/cinder-pet.js?v=20260616a"></script>
    <script src="/cat-home.js?v=20260616c"></script>
    <script src="/cat-home-ambient.js?v=20260617a"></script>
    <script src="/playdate.js?v=20260616c"></script>
  </body>
</html>
