<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>WhiskerWatch Reset Password</title>
    <link rel="stylesheet" href="/styles.css?v=20260708e" />
  </head>
  <body class="auth-page">
    <header class="topbar homepage-topbar auth-topbar">
      <a class="brand" href="/" aria-label="WhiskerWatch home">
        <img class="brand-logo" src="/images/logo.png" alt="WhiskerWatch" />
      </a>
    </header>

    <main class="login-page">
      <section class="login-card" aria-labelledby="reset-title">
        <h1 id="reset-title">Choose a New Password</h1>
        <p>Enter a new password for your WhiskerWatch account.</p>
        {{RESET_ERROR_BLOCK}}

        <form class="login-form" action="/reset-password" method="post">
          <input type="hidden" name="token" value="{{RESET_TOKEN}}" />

          <label for="reset-password">New password</label>
          <div class="password-field">
            <input
              id="reset-password"
              name="password"
              type="password"
              placeholder="Choose a new password"
              required
              autocomplete="new-password"
            />
            <button
              type="button"
              class="password-toggle password-toggle--hidden"
              data-password-toggle
              aria-label="Show password"
              aria-pressed="false"
            >
              <span class="password-toggle-icon password-toggle-icon--show" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </span>
              <span class="password-toggle-icon password-toggle-icon--hide" aria-hidden="true" hidden>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M1 1l22 22" />
                </svg>
              </span>
            </button>
          </div>
          <ul
            class="password-requirements"
            id="reset-password-requirements"
            aria-live="polite"
            aria-label="Password requirements"
          >
            <li data-req="length">
              <span class="password-req-icon" aria-hidden="true"></span>
              At least 5 characters
            </li>
            <li data-req="digit">
              <span class="password-req-icon" aria-hidden="true"></span>
              Includes a number
            </li>
            <li data-req="special">
              <span class="password-req-icon" aria-hidden="true"></span>
              Includes a special character
            </li>
          </ul>

          <label for="reset-confirm-password">Confirm new password</label>
          <div class="password-field">
            <input
              id="reset-confirm-password"
              name="confirm_password"
              type="password"
              placeholder="Re-enter your new password"
              required
              autocomplete="new-password"
            />
            <button
              type="button"
              class="password-toggle password-toggle--hidden"
              data-password-toggle
              aria-label="Show password"
              aria-pressed="false"
            >
              <span class="password-toggle-icon password-toggle-icon--show" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </span>
              <span class="password-toggle-icon password-toggle-icon--hide" aria-hidden="true" hidden>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M1 1l22 22" />
                </svg>
              </span>
            </button>
          </div>
          <p
            class="password-confirm-error"
            id="reset-password-confirm-error"
            role="alert"
            hidden
          >
            Passwords do not match.
          </p>

          <button
            type="submit"
            class="download-btn login-submit"
            id="reset-submit"
            disabled
          >
            Update password
          </button>
        </form>

        <p class="auth-footer">Need a new link?</p>
        <a href="/forgot-password" class="download-btn auth-link-btn">Request reset link</a>
      </section>
    </main>
    <script src="/paw-cursor.js"></script>
    <script src="/alerts.js"></script>
    <script src="/password-toggle.js"></script>
    <script>
      (function () {
        var form = document.querySelector(".login-form");
        var passwordInput = document.getElementById("reset-password");
        var confirmPasswordInput = document.getElementById("reset-confirm-password");
        var confirmError = document.getElementById("reset-password-confirm-error");
        var submitBtn = document.getElementById("reset-submit");
        var requirements = document.getElementById("reset-password-requirements");

        function passwordChecks(value) {
          return {
            length: value.length >= 5,
            digit: /[0-9]/.test(value),
            special: /[^A-Za-z0-9]/.test(value),
          };
        }

        function setRequirementState(item, met) {
          item.classList.toggle("password-req-met", met);
          item.classList.toggle("password-req-unmet", !met);
        }

        function passwordsMatch() {
          var confirmValue = confirmPasswordInput.value;
          if (!confirmValue) {
            confirmError.hidden = true;
            return false;
          }
          var match = passwordInput.value === confirmValue;
          confirmError.hidden = match;
          return match;
        }

        function updateFormValidity() {
          var value = passwordInput.value;
          var checks = passwordChecks(value);
          requirements.querySelectorAll("[data-req]").forEach(function (item) {
            setRequirementState(item, checks[item.getAttribute("data-req")]);
          });
          var allMet = checks.length && checks.digit && checks.special;
          var match = passwordsMatch();
          submitBtn.disabled = !(allMet && match);
        }

        passwordInput.addEventListener("input", updateFormValidity);
        passwordInput.addEventListener("blur", updateFormValidity);
        confirmPasswordInput.addEventListener("input", updateFormValidity);
        confirmPasswordInput.addEventListener("blur", updateFormValidity);

        form.addEventListener("submit", function (event) {
          if (!passwordsMatch()) {
            event.preventDefault();
            confirmPasswordInput.focus();
          }
        });

        updateFormValidity();
      })();
    </script>
  </body>
</html>
