<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>WhiskerWatch — Choose a Breed</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="dashboard-body">
    <header class="dashboard-topbar">
      <div class="brand" aria-label="WhiskerWatch">
        <img class="brand-logo" src="/images/logo.png" alt="WhiskerWatch" />
        <span class="dashboard-greeting">Hi, <a href="/home?tab=account" class="dashboard-greeting-link">{{USER_NAME}}</a>!</span>
      </div>
      <nav class="dashboard-nav">
        <a href="/home?tab=pet">HOME</a>
        <a href="/home?tab=feedback">FEEDBACK</a>
        {{ADMIN_NAV_LINK}}
        <a href="/contact">CONTACT</a>
        <form class="admin-logout-form" action="/logout" method="post">
          <button type="submit" class="admin-logout-btn">LOG OUT</button>
        </form>
      </nav>
    </header>

    <main class="breed-select-shell section">
      <h1>Choose your cat's breed</h1>
      <p class="panel-intro">{{BREED_INTRO}}</p>
      <div class="breed-catalog">
        {{BREED_CATALOG}}
      </div>
      <p class="breed-back-wrap">
        <a href="{{BREED_BACK_URL}}" class="download-btn auth-link-btn breed-back-btn">Back</a>
      </p>
    </main>
    <script src="/paw-cursor.js"></script>
  </body>
</html>
