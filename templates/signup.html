<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WhiskerWatch Sign Up</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand" aria-label="WhiskerWatch">
        <img class="brand-logo" src="/images/logo.png" alt="WhiskerWatch" />
      </div>
      <nav>
        <a href="/">HOME</a>
        <a href="/#features">FEATURES</a>
        <a href="/login">LOG IN</a>
        <a href="/feedback">FEEDBACK</a>
        <a href="/contact">CONTACT</a>
      </nav>
    </header>

    <main class="section login-page">
      <section class="login-card" aria-labelledby="signup-title">
        <h1 id="signup-title">Sign Up for WhiskerWatch</h1>
        <p>Create an account to track your cat's needs and earn paw points.</p>
        {{SIGNUP_INFO_BLOCK}}
        {{SIGNUP_ERROR_BLOCK}}

        <form class="login-form" action="/signup" method="post">
          <label for="signup-name">Name</label>
          <input id="signup-name" name="name" type="text" placeholder="Your name" required />

          <label for="signup-email">Email</label>
          <input
            id="signup-email"
            name="email"
            type="email"
            placeholder="you@example.com"
            value="{{SIGNUP_EMAIL}}"
            required
          />

          <label for="signup-password">Password</label>
          <div class="password-field">
            <input
              id="signup-password"
              name="password"
              type="password"
              placeholder="Choose a password"
              required
            />
            <button
              type="button"
              class="password-toggle password-toggle--hidden"
              data-password-toggle
              aria-label="Show password"
              aria-pressed="false"
            >
              <span class="password-toggle-icon password-toggle-icon--show" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </span>
              <span class="password-toggle-icon password-toggle-icon--hide" aria-hidden="true" hidden>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M1 1l22 22" />
                </svg>
              </span>
            </button>
          </div>

          <button type="submit" class="download-btn login-submit">Sign Up</button>
        </form>

        <p class="auth-footer">Already have an account?</p>
        <a href="/login" class="download-btn auth-link-btn">Log In</a>
      </section>
    </main>
    <script src="/password-toggle.js"></script>
    <script>
      if (window.location.search) {
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    </script>
  </body>
</html>
