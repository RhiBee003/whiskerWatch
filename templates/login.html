<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>WhiskerWatch Login</title>
    <link rel="stylesheet" href="/styles.css?v=20260708e" />
  </head>
  <body class="auth-page">
    <header class="topbar homepage-topbar auth-topbar">
      <a class="brand" href="/" aria-label="WhiskerWatch home">
        <img class="brand-logo" src="/images/logo.png" alt="WhiskerWatch" />
      </a>
    </header>

    <main class="login-page">
      <section class="login-card" aria-labelledby="login-title">
        <h1 id="login-title">Log In to WhiskerWatch</h1>
        <p>Track your cat's needs, earn paw points, and manage your virtual pet.</p>
        {{SIGNUP_SUCCESS_BLOCK}}
        {{RESET_SUCCESS_BLOCK}}
        {{ACCOUNT_EXISTS_BLOCK}}
        {{LOGIN_ERROR_BLOCK}}

        <form class="login-form" action="/login" method="post">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="demo@whiskerwatch.app" value="{{LOGIN_EMAIL}}" required />

          <label for="password">Password</label>
          <div class="password-field">
            <input id="password" name="password" type="password" placeholder="meow123" value="{{LOGIN_PASSWORD}}" required />
            <button
              type="button"
              class="password-toggle password-toggle--hidden"
              data-password-toggle
              aria-label="Show password"
              aria-pressed="false"
            >
              <span class="password-toggle-icon password-toggle-icon--show" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </span>
              <span class="password-toggle-icon password-toggle-icon--hide" aria-hidden="true" hidden>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M1 1l22 22" />
                </svg>
              </span>
            </button>
          </div>

          <p class="forgot-password-link">
            <a href="/forgot-password">Forgot password?</a>
          </p>

          <button type="submit" class="download-btn login-submit">Log In</button>
        </form>

        <p class="auth-footer">New here?</p>
        <a href="/signup" class="download-btn auth-link-btn">Sign Up</a>
      </section>
    </main>
    <script src="/paw-cursor.js"></script>
    <script src="/alerts.js"></script>
    <script src="/password-toggle.js"></script>
    <script>
      if (window.location.search) {
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    </script>
  </body>
</html>
