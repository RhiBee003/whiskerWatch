<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WhiskerWatch Login</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand" aria-label="WhiskerWatch">
        <img class="brand-logo" src="/images/logo.png" alt="WhiskerWatch" />
      </div>
      <nav>
        <a href="/">HOME</a>
        <a href="/#features">FEATURES</a>
        <a href="/login">LOG IN</a>
        <a href="/contact">CONTACT</a>
      </nav>
    </header>

    <main class="section login-page">
      <section class="login-card" aria-labelledby="login-title">
        <h1 id="login-title">Log In to WhiskerWatch</h1>
        <p>Track your cat's needs, earn paw points, and manage your virtual pet.</p>
        {{SIGNUP_SUCCESS_BLOCK}}
        {{LOGIN_ERROR_BLOCK}}

        <form class="login-form" action="/login" method="post">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="demo@whiskerwatch.app" required />

          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="meow123" required />

          <button type="submit" class="download-btn login-submit">Log In</button>
        </form>

        <p class="auth-footer">New here?</p>
        <a href="/signup" class="download-btn auth-link-btn">Sign Up</a>
      </section>
    </main>
    <script>
      if (window.location.search) {
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    </script>
  </body>
</html>
