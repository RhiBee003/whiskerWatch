<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>WhiskerWatch Forgot Password</title>
    <link rel="stylesheet" href="/styles.css?v=20260708e" />
  </head>
  <body class="auth-page">
    <header class="topbar homepage-topbar auth-topbar">
      <a class="brand" href="/" aria-label="WhiskerWatch home">
        <img class="brand-logo" src="/images/logo.png" alt="WhiskerWatch" />
      </a>
    </header>

    <main class="login-page">
      <section class="login-card" aria-labelledby="forgot-title">
        <h1 id="forgot-title">Reset Your Password</h1>
        <p>Enter the email address for your account and we will send reset instructions.</p>
        {{FORGOT_SUCCESS_BLOCK}}
        {{FORGOT_ERROR_BLOCK}}
        {{DEV_RESET_LINK_BLOCK}}

        <form class="login-form" action="/forgot-password" method="post">
          <label for="forgot-email">Email</label>
          <input
            id="forgot-email"
            name="email"
            type="email"
            placeholder="you@example.com"
            required
            autocomplete="email"
          />

          <button type="submit" class="download-btn login-submit">Send reset link</button>
        </form>

        <p class="auth-footer">Remember your password?</p>
        <a href="/login" class="download-btn auth-link-btn">Back to Log In</a>
      </section>
    </main>
    <script src="/paw-cursor.js"></script>
    <script src="/alerts.js"></script>
    <script>
      if (window.location.search && !document.querySelector(".dev-reset-notice")) {
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    </script>
  </body>
</html>
