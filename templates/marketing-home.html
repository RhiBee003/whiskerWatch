<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>WhiskerWatch</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="homepage">
    <header class="topbar homepage-topbar">
      <a class="brand" href="/" aria-label="WhiskerWatch home">
        <img class="brand-logo" src="/images/logo.png" alt="WhiskerWatch" />
      </a>
      <nav>
        <a href="/">HOME</a>
        <a href="/#features">FEATURES</a>
        <a href="/login">LOG IN</a>
        <a href="/feedback">FEEDBACK</a>
        <a href="/contact">CONTACT</a>
      </nav>
    </header>

    <main id="home">
      <section class="home-hero section">
        <div class="home-hero-copy">
          <h1>The app for cat owners, from a cat owner.</h1>
          <a class="home-download-btn" href="#download" id="download">
            <span class="home-app-icon" aria-hidden="true">
              <span class="home-app-icon-ww">WW</span>
            </span>
            <span class="home-download-label">Download the App</span>
            <svg class="home-download-arrow" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
              <path
                fill="currentColor"
                d="M12 3v12m0 0l4-4m-4 4l-4-4M5 19h14"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                fill="none"
              />
            </svg>
          </a>
          <p class="home-hero-sub">
            Get the app on your watch to stay updated on your kitties needs! ios and android compatible.
          </p>
        </div>
        <div class="home-hero-art">
          <img
            class="home-hero-tat-girl"
            src="/images/tat-girl-frame.png?v=2"
            alt="A cat owner with tattoos playing with a black kitten"
          />
        </div>
      </section>

      <section class="home-features" id="features">
        <article class="home-feature home-feature-play">
          <figure class="home-feature-promo-figure">
            <img
              class="home-feature-promo-img"
              src="/images/notif-play.png"
              alt="Be notified when it's time to play! WhiskerWatch notification: Cinder needs attention — click to log quality time spent with your fur baby."
            />
          </figure>
          <div class="home-feature-art home-feature-art-right">
            <img src="/images/cat-leaping.png" alt="Black cat leaping through a cozy living room" />
          </div>
        </article>

        <article class="home-feature home-feature-feed">
          <div class="home-feature-art home-feature-art-left">
            <img
              class="home-feature-art-img"
              src="/images/cat-eating-feature.png"
              alt="Black cat eating from a bowl in a cozy living room"
            />
          </div>
          <figure class="home-feature-promo-figure">
            <img
              class="home-feature-promo-img"
              src="/images/notif-feed.png"
              alt="Feeding reminders so your kitties are always on schedule! WhiskerWatch notification: Cinder is hangry — feed your fur babies and check in for paw points."
            />
          </figure>
        </article>

        <article class="home-feature home-feature-health">
          <figure class="home-feature-promo-figure">
            <img
              class="home-feature-promo-img"
              src="/images/notif-health.png"
              alt="Stay up to date on shots and check ups with health tracking. WhiskerWatch reminders for monthly health reports and vet appointments."
            />
          </figure>
          <div class="home-feature-art home-feature-art-right">
            <img
              class="home-feature-art-img"
              src="/images/vet-scene-feature.png"
              alt="Veterinarian giving a black cat a vaccination at the clinic"
            />
          </div>
        </article>
      </section>

      <section class="home-pawpoints section">
        <figure class="home-pawpoints-promo-figure">
          <img
            class="home-pawpoints-promo-img"
            src="/images/paw-points-promo.png"
            alt="Paw points! Earn rewards with paw-shaped treats and track your progress."
          />
        </figure>
      </section>

      <section class="home-earn section">
        <figure class="home-feature-promo-figure home-earn-promo-figure">
          <img
            class="home-feature-promo-img"
            src="/images/notif-earn.png"
            alt="Earn paw points to customize your kitty. WhiskerWatch notification: you have paw points to spend on cat and environment customization."
          />
        </figure>
      </section>
    </main>

    <footer class="homepage-footer">
      <div class="homepage-footer-brand">
        <img class="brand-logo" src="/images/logo.png" alt="WhiskerWatch" />
      </div>
      <p>Keep your kitties happy ~ in home life, <strong>and virtual!</strong></p>
      <p class="homepage-footer-links">
        <a href="/login">Log in</a>
        <span aria-hidden="true">·</span>
        <a href="/feedback">Feedback</a>
        <span aria-hidden="true">·</span>
        <a href="/contact">Contact</a>
      </p>
    </footer>
  </body>
</html>
